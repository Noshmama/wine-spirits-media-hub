name: Update Wine & Spirits Media Content

on:
  schedule:
    # Run every Wednesday and Sunday at 8:30 AM UTC (3:30 AM Eastern, after quota resets)
    - cron: '30 8 * * 0,3'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write

jobs:
  update-youtube:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch YouTube videos
        run: node scripts/fetch-youtube.js
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY_CI }}

      - name: Commit and push YouTube data
        timeout-minutes: 5
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/youtube.json data/known-channels.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update YouTube video content [automated]"
            git pull --rebase origin master
            git push
          fi

  update-podcasts:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch Podcasts
        run: node scripts/fetch-podcasts.js

      - name: Commit and push Podcast data
        timeout-minutes: 5
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/podcasts.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update podcast content [automated]"
            git pull --rebase origin master
            git push
          fi
